<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>随笔集</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <a href="index.html" class="site-title">随笔集</a>
  <a href="index.html">文章</a>
  <a href="about.html">关于</a>
  <span class="nav-spacer"></span>
  <button class="theme-toggle" id="themeToggle" aria-label="切换暗色模式">☾ 暗色</button>
</nav>

<div class="header">
  <h1>静下来，写下来</h1>
  <p>这里是一些随笔。关于雨天、阅读、写作，以及生活中那些值得被记下的瞬间。</p>
</div>

<div class="search-box">
  <input type="text" id="searchInput" placeholder="搜索文章标题或摘要…" aria-label="搜索文章">
</div>

<div class="tag-filter" id="tagFilter">
  <button class="tag tag-all active" data-tag="">全部</button>
</div>

<ul class="essay-list" id="essayList">
  <!-- JS 自动从 ESSAYS 数组渲染文章列表，无需手动编辑 -->
</ul>

<div class="search-no-results" id="searchNoResults">
  <p>没有找到匹配的文章 🤔</p>
</div>

<footer>
  <p>&copy; 2026 <a href="about.html">关于我</a><a href="rss.xml" class="rss-link">RSS 订阅</a></p>
</footer>

<button class="back-to-top" id="backToTop" title="返回顶部" aria-label="返回顶部">↑</button>

<script src="script.js"></script>
</body>
</html>
